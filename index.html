<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteForge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #2c3e50;
        }
        .input-section {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        #paste-zone {
            border: 2px dashed #bbb;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            background-color: white;
            position: relative;
        }
        #paste-zone img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            display: none;
        }
        #paste-zone.label {
            color: #7f8c8d;
            font-size: 16px;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            resize: vertical;
        }
        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-section label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-section input,
        .form-section select,
        .form-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        .form-section textarea {
            min-height: 60px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status-bar {
            margin: 20px 0;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.2s, color 0.2s;
        }
        #status-bar.idle {
            background-color: #ecf0f1;
            color: #7f8c8d;
        }
        #status-bar.generating {
            background-color: #f39c12;
            color: white;
        }
        #status-bar.saved {
            background-color: #2ecc71;
            color: white;
        }
        #status-bar.error {
            background-color: #e74c3c;
            color: white;
        }
        .output-section {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .output-section h2 {
            margin-top: 0;
        }
        #file-info {
            margin-bottom: 15px;
            font-size: 14px;
            color: #7f8c8d;
        }
        #copy-button {
            background-color: #9b59b6;
            margin-right: 10px;
        }
        #copy-button:hover {
            background-color: #8e44ad;
        }
        #markdown-preview {
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        /* Markdown styling */
        #markdown-preview h1,
        #markdown-preview h2,
        #markdown-preview h3 {
            color: #2c3e50;
        }
        #markdown-preview pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        #markdown-preview code {
            font-family: 'Courier New', Courier, monospace;
        }
        #markdown-preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }
        #markdown-preview th,
        #markdown-preview td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        #markdown-preview th {
            background-color: #f2f2f2;
        }
        #markdown-preview tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        #markdown-preview blockquote {
            border-left: 4px solid #3498db;
            padding-left: 15px;
            color: #7f8c8d;
        }
        #markdown-preview hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>NoteForge</h1>
    </header>

    <div class="input-section">
        <div id="paste-zone">
            <div class="label">paste screenshot here (ctrl+v)</div>
            <img id="paste-preview" alt="Pasted image">
        </div>
        <textarea id="text-input" placeholder="Or type/paste text here..."></textarea>
    </div>

    <div class="form-section">
        <div>
            <label for="room-input">Room name</label>
            <input type="text" id="room-input" placeholder="e.g., Meeting Room A">
        </div>
        <div>
            <label for="difficulty-select">Difficulty</label>
            <select id="difficulty-select">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>
        <div>
            <label for="what-was-new">What was new</label>
            <textarea id="what-was-new" placeholder="Describe what was new or changed..."></textarea>
        </div>
        <div style="grid-column: 1 / -1; display: flex; justify-content: flex-end;">
            <button id="generate-button">Generate Note</button>
        </div>
    </div>

    <div id="status-bar" class="idle">idle</div>

    <div class="output-section" id="output-section" style="display: none;">
        <h2>Generated Note</h2>
        <div id="file-info">
            <span id="filename-display"></span>
            <span id="filepath-display" style="margin-left: 15px;"></span>
            <button id="copy-button">Copy to Clipboard</button>
        </div>
        <div id="markdown-preview"></div>
    </div>

    <script>
        // State management
        let currentImage = null;  // base64 string
        let isGenerating = false;

        // DOM elements
        const pasteZone = document.getElementById('paste-zone');
        const pastePreview = document.getElementById('paste-preview');
        const textInput = document.getElementById('text-input');
        const roomInput = document.getElementById('room-input');
        const difficultySelect = document.getElementById('difficulty-select');
        const whatWasNewInput = document.getElementById('what-was-new');
        const generateButton = document.getElementById('generate-button');
        const statusBar = document.getElementById('status-bar');
        const outputSection = document.getElementById('output-section');
        const filenameDisplay = document.getElementById('filename-display');
        const filepathDisplay = document.getElementById('filepath-display');
        const copyButton = document.getElementById('copy-button');
        const markdownPreview = document.getElementById('markdown-preview');

        // Handle paste events
        document.addEventListener('paste', async (e) => {
            if (!e.clipboardData || !e.clipboardData.items) return;

            for (const item of e.clipboardData.items) {
                if (item.type.indexOf('image') === 0) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentImage = event.target.result.split(',')[1]; // Get base64 part
                        pastePreview.src = event.target.result;
                        pastePreview.style.display = 'block';
                        pasteZone.querySelector('.label').style.display = 'none';
                    };
                    reader.readAsDataURL(blob);
                    break; // Only process the first image
                }
            }
        });

        // Clear image when clicking paste zone
        pasteZone.addEventListener('click', () => {
            currentImage = null;
            pastePreview.src = '';
            pastePreview.style.display = 'none';
            pasteZone.querySelector('.label').style.display = 'block';
        });

        // Generate button click handler
        generateButton.addEventListener('click', async () => {
            // Validate inputs
            if (!currentImage && !textInput.value.trim()) {
                showStatus('Please provide either an image or text', 'error');
                return;
            }
            if (!roomInput.value.trim()) {
                showStatus('Please provide a room name', 'error');
                return;
            }

            // Set generating state
            isGenerating = true;
            generateButton.disabled = true;
            showStatus('Generating...', 'generating');
            outputSection.style.display = 'none';

            try {
                // Prepare request payload
                const payload = {
                    image_b64: currentImage || null,
                    text: textInput.value.trim() || null,
                    room: roomInput.value.trim(),
                    difficulty: difficultySelect.value,
                    what_was_new: whatWasNewInput.value.trim(),
                    system_prompt: "" // Injected from frontend or empty string
                };

                // Send request to backend
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Unknown error');
                }

                const result = await response.json();

                // Update UI with result
                filenameDisplay.textContent = `Filename: ${result.filename}`;
                filepathDisplay.textContent = `Filepath: ${result.filepath}`;
                markdownPreview.innerHTML = marked.parse(result.content);
                outputSection.style.display = 'block';

                showStatus(`Saved to ${result.filename}`, 'saved');
            } catch (error) {
                console.error('Error:', error);
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                // Reset generating state
                isGenerating = false;
                generateButton.disabled = false;
            }
        });

        // Update status bar
        function showStatus(message, type) {
            statusBar.textContent = message;
            statusBar.className = '';
            statusBar.classList.add(type);
        }

        // Copy to clipboard functionality
        copyButton.addEventListener('click', () => {
            const textToCopy = markdownPreview.innerText || markdownPreview.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyButton.textContent;
                copyButton.textContent = 'Copied!';
                setTimeout(() => {
                    copyButton.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        });
    </script>
</body>
</html>
